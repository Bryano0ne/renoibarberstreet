<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1000"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C47A"/>
      <stop offset="100%" style="stop-color:#A07830"/>
    </linearGradient>
    <linearGradient id="bottle1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="bottle2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid subtle -->
  <g opacity="0.04" stroke="#C9A84C" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Glow orb -->
  <circle cx="200" cy="150" r="90" fill="#C9A84C" opacity="0.04"/>
  <circle cx="200" cy="150" r="50" fill="#C9A84C" opacity="0.05"/>

  <!-- ── FLACON 1 (grand, gauche) ── -->
  <!-- Corps -->
  <rect x="110" y="90" width="52" height="130" rx="10" fill="url(#bottle1)" opacity="0.92"/>
  <!-- Reflet -->
  <rect x="116" y="98" width="12" height="110" rx="6" fill="white" opacity="0.12"/>
  <!-- Col -->
  <rect x="122" y="72" width="28" height="22" rx="5" fill="#A07830"/>
  <!-- Bouchon -->
  <rect x="125" y="60" width="22" height="16" rx="4" fill="#C9A84C"/>
  <!-- Étiquette -->
  <rect x="117" y="118" width="38" height="52" rx="4" fill="#0A0A0A" opacity="0.35"/>
  <line x1="124" y1="130" x2="148" y2="130" stroke="#E2C47A" stroke-width="1.5" opacity="0.8"/>
  <line x1="124" y1="138" x2="148" y2="138" stroke="#E2C47A" stroke-width="0.8" opacity="0.5"/>
  <line x1="124" y1="145" x2="140" y2="145" stroke="#E2C47A" stroke-width="0.8" opacity="0.5"/>
  <text x="136" y="160" font-family="sans-serif" font-size="7" fill="#E2C47A" text-anchor="middle" font-weight="bold" opacity="0.9">HAIR OIL</text>

  <!-- ── FLACON 2 (petit, droite) ── -->
  <!-- Corps -->
  <rect x="236" y="110" width="44" height="110" rx="9" fill="url(#bottle2)" opacity="0.95"/>
  <!-- Reflet -->
  <rect x="241" y="117" width="10" height="90" rx="5" fill="white" opacity="0.08"/>
  <!-- Pompe -->
  <rect x="251" y="92" width="14" height="22" rx="3" fill="#3A3A3A"/>
  <rect x="253" y="80" width="10" height="14" rx="3" fill="#C9A84C"/>
  <rect x="249" y="86" width="18" height="6" rx="3" fill="#C9A84C" opacity="0.7"/>
  <!-- Étiquette -->
  <rect x="242" y="128" width="32" height="44" rx="4" fill="#C9A84C" opacity="0.15"/>
  <line x1="248" y1="138" x2="268" y2="138" stroke="#C9A84C" stroke-width="1.5" opacity="0.9"/>
  <line x1="248" y1="146" x2="268" y2="146" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <text x="258" y="162" font-family="sans-serif" font-size="6.5" fill="#C9A84C" text-anchor="middle" font-weight="bold">SÉRUM</text>

  <!-- ── POT crème (centre) ── -->
  <!-- Corps -->
  <ellipse cx="198" cy="218" rx="34" ry="12" fill="#1A1800" stroke="#C9A84C" stroke-width="1.5" opacity="0.9"/>
  <rect x="164" y="195" width="68" height="23" rx="4" fill="#1A1800" stroke="#C9A84C" stroke-width="1.5" opacity="0.9"/>
  <!-- Couvercle -->
  <ellipse cx="198" cy="195" rx="34" ry="11" fill="#C9A84C" opacity="0.85"/>
  <ellipse cx="198" cy="195" rx="26" ry="7" fill="#E2C47A" opacity="0.6"/>
  <!-- Logo -->
  <text x="198" y="199" font-family="sans-serif" font-size="8" fill="#0A0A0A" text-anchor="middle" font-weight="900">RENOI</text>
  <!-- Label côté -->
  <text x="198" y="212" font-family="sans-serif" font-size="6" fill="#C9A84C" text-anchor="middle" opacity="0.8">SOIN CUIR CHEVELU</text>

  <!-- ── FEUILLE / plante déco ── -->
  <g opacity="0.5" filter="url(#glow)">
    <path d="M320 230 Q340 200 360 180 Q350 210 330 240 Z" fill="#2A4A20"/>
    <path d="M325 235 Q350 210 370 195 Q355 220 335 245 Z" fill="#1A3A10"/>
    <line x1="325" y1="235" x2="355" y2="200" stroke="#3A6A25" stroke-width="1" opacity="0.6"/>
  </g>
  <g opacity="0.4">
    <path d="M55 220 Q38 195 30 170 Q45 195 62 225 Z" fill="#2A4A20"/>
    <path d="M52 225 Q32 202 25 180 Q40 205 58 230 Z" fill="#1A3A10"/>
  </g>

  <!-- ── GOUTTES ── -->
  <g fill="#C9A84C" filter="url(#glow)">
    <ellipse cx="168" cy="82" rx="4" ry="6" opacity="0.7"/>
    <ellipse cx="163" cy="94" rx="2.5" ry="4" opacity="0.4"/>
    <ellipse cx="310" cy="150" rx="3" ry="4.5" opacity="0.5"/>
    <ellipse cx="318" cy="162" rx="2" ry="3" opacity="0.3"/>
  </g>

  <!-- ── TEXTE BAS ── -->
  <line x1="60" y1="264" x2="340" y2="264" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="280" font-family="sans-serif" font-size="9" fill="#C9A84C" text-anchor="middle" opacity="0.6" letter-spacing="4">SOINS PROFESSIONNELS</text>
</svg>
